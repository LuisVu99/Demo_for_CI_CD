name: QA Automation

on:
  pull_request:
    branches: [main]

  schedule:   #Run CI theo lịch
    - cron: '40 9 * * *' #Run at:7:00 am utc + 7

  workflow_dispatch:   #Run manually

  push:
    tags:   #Run theo tag
      - 'v*'

  release:
    types: [published] #Run khi release được publish

jobs:
  test:
    runs-on: ubuntu-latest
    environment: developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run test
        id: test
        run: pytest --alluredir=allure-results -v --tb=short
        env:
          base_url: ${{ vars.base_url }}
          ADMIN_EMAIL: ${{ secrets.admin_email }}
          ADMIN_PASSWORD: ${{ secrets.admin_password }}
          ADMIN_USERNAME: ${{ secrets.admin_username }}
          USER_FULL_NAME: ${{ secrets.user_full_name }}
          USER_PASSWORD: ${{ secrets.user_password }}
          USER_USERNAME: ${{ secrets.user_username }}

      - name: Notify Slack
        if: always()
        run: |
          STATUS=${{ job.status }}
          BRANCH=${{ github.ref_name }}
          COMMIT=${{ github.sha }}
          COMMIT_SHORT=$(echo $COMMIT | cut -c1-7)
          
          # Count test results from allure-results
          PASSED=$(find allure-results -name "*.json" -type f | wc -l 2>/dev/null || echo "0")
          
          if [ "$STATUS" == "success" ]; then
            ICON="✅"
            MSG="Test PASSED"
          else
            ICON="❌"
            MSG="Test FAILED"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"$ICON *$MSG*
            \n📊 Test Results
            \n├─ Branch: \`$BRANCH\`
            \n├─ Commit: \`$COMMIT_SHORT\`
            \n├─ Tests: $PASSED executed
            \n└─ Repo: <https://github.com/$GITHUB_REPOSITORY|$GITHUB_REPOSITORY>
            \n\n🔗 <https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID|View Full Report>\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  allure-report:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history (if exists)
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history allure-results/ || true
          fi

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages